# OmniDesk — full self-hosted stack.
#   cp .env.example .env   (edit POSTGRES_PASSWORD, JWT secrets, FRONTEND_URL)
#   docker compose up -d --build
# Backend/frontend build from the REPO ROOT context (pnpm workspace).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.placeholder.local}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@omnidesk.local}
      UPLOADS_DIR: /data/uploads
      UPLOADS_MAX_BYTES: ${UPLOADS_MAX_BYTES:-5242880}
      UPLOADS_QUOTA_PER_USER_BYTES: ${UPLOADS_QUOTA_PER_USER_BYTES:-524288000}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-none}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
      REGISTRATION_OPEN: ${REGISTRATION_OPEN:-true}
      TERMS_VERSION: ${TERMS_VERSION:-2026-05}
      USER_DEFAULT_TIMEZONE: ${USER_DEFAULT_TIMEZONE:-UTC}
      SOFT_DELETE_DAYS: ${SOFT_DELETE_DAYS:-30}
      NODE_ENV: production
    volumes:
      - uploads_data:/data/uploads
      - logs:/data/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
        CAPTCHA_SITE_KEY: ${CAPTCHA_SITE_KEY:-}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

volumes:
  pg_data:
  uploads_data:
  certs:
  certbot_webroot:
  logs:
