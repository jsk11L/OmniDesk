# Edge reverse proxy for OmniDesk (the `nginx` service in docker-compose.yml).
# Ships HTTP-only so `docker compose up` works out of the box. Enable the HTTPS
# server block below once you have certs — see docs/operations/https-setup.md.

server {
  listen 80;
  server_name _;

  # Allow uploads (UPLOADS_MAX_BYTES default 5 MiB) + a little overhead.
  client_max_body_size 6m;

  # Let's Encrypt webroot challenge (used by external Certbot).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Obsidian vault import accepts large uploads (the app enforces a 200 MB cap).
  location /api/import/ {
    client_max_body_size 210m;
    proxy_pass http://backend:3000/import/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # REST API → backend, stripping the /api prefix (backend serves /auth, /notes…).
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # User-uploaded files are served by the backend at /uploads (keep the path).
  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_set_header Host $host;
  }

  # Everything else → the frontend SPA container.
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

